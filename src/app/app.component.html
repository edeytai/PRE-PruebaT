<div class="app-shell">
  <header class="masthead">
    <div class="masthead__row">
      <a class="masthead__brand" routerLink="/">
        <span class="masthead__mark serif">Atelier &mdash; Gym</span>
      </a>
      <div class="masthead__meta">
        <span class="eyebrow">Reservas semanales</span>
      </div>
    </div>
    <hr class="masthead__rule" />
  </header>

  <main class="app-shell__main" [@routeAnimations]="prepareRoute(outlet)">
    <router-outlet #outlet="outlet" />
  </main>

  <footer class="app-shell__footer">
    <hr class="masthead__rule masthead__rule--top" />
    <small>
      Atelier Gym &middot; Prueba tecnica Angular 17 &middot; Sin librerias UI
    </small>
  </footer>
</div>
