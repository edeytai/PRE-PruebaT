# Despliegue automático a GitHub Pages.
#
# Cómo activarlo:
# 1. En Settings → Pages, elegir "GitHub Actions" como source.
# 2. Hacer push a main (o ejecutar workflow_dispatch).
#
# El workflow construye la app con base-href configurado al nombre del
# repo y publica /dist/gym-bookings/browser como artefacto de Pages.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build -- --base-href=/${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5
        # `enablement: true` habilita Pages automaticamente en el primer
        # run si todavia no esta activado en Settings -> Pages. Requiere
        # los permisos pages: write e id-token: write declarados arriba.
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/gym-bookings/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
